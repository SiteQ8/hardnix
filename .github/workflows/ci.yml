name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint hardnix.sh
        run: shellcheck -x hardnix.sh

      - name: Lint modules
        run: |
          for f in modules/*.sh; do
            echo "Checking $f..."
            shellcheck -x "$f" || true
          done

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test (terminal output, no root needed checks)
        run: |
          chmod +x hardnix.sh
          mkdir -p output
          bash hardnix.sh -m ssh,fs,users -n --help || true
