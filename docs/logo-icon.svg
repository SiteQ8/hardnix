<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Outer glow for red elements -->
    <filter id="redglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Grid pattern for background texture -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a1f2e" stroke-width="0.5"/>
    </pattern>

    <!-- Clip path for shield shape -->
    <clipPath id="shieldClip">
      <path d="M200 30 L340 90 L340 210 Q340 310 200 375 Q60 310 60 210 L60 90 Z"/>
    </clipPath>
  </defs>

  <!-- ── Background ─────────────────────────────────────────────── -->
  <rect width="400" height="400" fill="#090c10"/>
  <rect width="400" height="400" fill="url(#grid)" opacity="0.6"/>

  <!-- ── Outer ring / orbit marks ──────────────────────────────── -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="#1e2535" stroke-width="1"/>
  <circle cx="200" cy="200" r="175" fill="none" stroke="#ff4757" stroke-width="1" stroke-dasharray="8 4" opacity="0.25"/>

  <!-- Corner tick marks on outer ring -->
  <g fill="none" stroke="#ff4757" stroke-width="1.5" opacity="0.5">
    <line x1="200" y1="25"  x2="200" y2="18"/>
    <line x1="375" y1="200" x2="382" y2="200"/>
    <line x1="200" y1="375" x2="200" y2="382"/>
    <line x1="25"  y1="200" x2="18"  y2="200"/>
    <!-- diagonal ticks -->
    <line x1="317" y1="83"  x2="322" y2="78"/>
    <line x1="317" y1="317" x2="322" y2="322"/>
    <line x1="83"  y1="317" x2="78"  y2="322"/>
    <line x1="83"  y1="83"  x2="78"  y2="78"/>
  </g>

  <!-- ── Shield body ────────────────────────────────────────────── -->
  <!-- Shadow/depth layer -->
  <path d="M200 38 L332 94 L332 212 Q332 308 200 370 Q68 308 68 212 L68 94 Z"
        fill="#0d1117" stroke="#21262d" stroke-width="1"/>

  <!-- Main shield fill -->
  <path d="M200 42 L328 96 L328 212 Q328 305 200 366 Q72 305 72 212 L72 96 Z"
        fill="#0f1520" stroke="#2d3748" stroke-width="1.5"/>

  <!-- Shield inner bevel -->
  <path d="M200 55 L315 103 L315 212 Q315 295 200 350 Q85 295 85 212 L85 103 Z"
        fill="none" stroke="#1a2030" stroke-width="1"/>

  <!-- Red accent stripe at top of shield -->
  <path d="M200 42 L328 96 L328 112 L200 58 L72 112 L72 96 Z"
        fill="#ff4757" opacity="0.12" filter="url(#redglow)"/>
  <path d="M200 42 L328 96 L72 96 Z"
        fill="none" stroke="#ff4757" stroke-width="1.5" opacity="0.6" filter="url(#softglow)"/>

  <!-- ── Inner hexagon ──────────────────────────────────────────── -->
  <polygon points="200,108 248,135 248,189 200,216 152,189 152,135"
           fill="#0a0d14" stroke="#ff4757" stroke-width="1.5" filter="url(#softglow)"/>
  <polygon points="200,116 240,140 240,186 200,208 160,186 160,140"
           fill="none" stroke="#1e2535" stroke-width="1"/>

  <!-- ── Terminal cursor "H" custom letterform ─────────────────── -->
  <!-- Left vertical bar of H -->
  <rect x="169" y="138" width="10" height="52" fill="#ff4757" filter="url(#redglow)"/>
  <!-- Right vertical bar of H -->
  <rect x="221" y="138" width="10" height="52" fill="#ff4757" filter="url(#redglow)"/>
  <!-- Crossbar of H -->
  <rect x="169" y="159" width="62" height="10" fill="#ff4757" filter="url(#redglow)"/>

  <!-- Blinking cursor rect — design element, not literal -->
  <rect x="231" y="177" width="8" height="12" fill="#ff4757" opacity="0.7" filter="url(#redglow)"/>

  <!-- ── Scan line over hex ─────────────────────────────────────── -->
  <line x1="152" y1="162" x2="248" y2="162"
        stroke="#ff4757" stroke-width="0.75" opacity="0.3" stroke-dasharray="3 3"/>

  <!-- ── Bottom shield section — module dots ───────────────────── -->
  <!-- 12 dots = 12 modules -->
  <g fill="#ff4757" opacity="0.5">
    <circle cx="152" cy="238" r="3"/>
    <circle cx="165" cy="252" r="3"/>
    <circle cx="180" cy="262" r="3"/>
    <circle cx="196" cy="267" r="3"/>
    <circle cx="212" cy="264" r="3"/>
    <circle cx="226" cy="255" r="3"/>

    <circle cx="238" cy="240" r="3"/>
    <circle cx="173" cy="278" r="2.5"/>
    <circle cx="188" cy="285" r="2.5"/>
    <circle cx="204" cy="287" r="2.5"/>
    <circle cx="218" cy="281" r="2.5"/>
    <circle cx="230" cy="268" r="2.5"/>
  </g>

  <!-- Connecting lines between dots -->
  <polyline
    points="152,238 165,252 180,262 196,267 212,264 226,255 238,240"
    fill="none" stroke="#ff4757" stroke-width="0.75" opacity="0.35"/>

  <!-- ── Corner bracket decorations on shield ──────────────────── -->
  <g fill="none" stroke="#ff4757" stroke-width="1.5" opacity="0.4">
    <!-- top-left bracket -->
    <polyline points="90,130 90,108 112,108"/>
    <!-- top-right bracket -->
    <polyline points="310,130 310,108 288,108"/>
    <!-- bottom indicator -->
    <line x1="185" y1="355" x2="215" y2="355"/>
    <line x1="192" y1="361" x2="208" y2="361"/>
  </g>

  <!-- ── Wordmark ───────────────────────────────────────────────── -->
  <!-- HARDNIX text below shield -->
  <text x="200" y="395"
        font-family="'Courier New', Courier, monospace"
        font-size="0"
        fill="#e6edf3"
        text-anchor="middle"
        letter-spacing="8">
  </text>

  <!-- Manual letter placement for precise kerning -->
  <g font-family="'Courier New', Courier, monospace" font-size="18"
     font-weight="bold" letter-spacing="2" fill="#e6edf3"
     text-anchor="middle">
    <!-- Not using text element for perfect control, using individual rects/paths -->
  </g>

  <!-- Small coordinate text — cyberpunk detail -->
  <text x="75" y="390" font-family="monospace" font-size="7.5"
        fill="#ff4757" opacity="0.4" letter-spacing="1">v1.0.0</text>
  <text x="290" y="390" font-family="monospace" font-size="7.5"
        fill="#ff4757" opacity="0.4" letter-spacing="1" text-anchor="end">107 CHECKS</text>

</svg>
