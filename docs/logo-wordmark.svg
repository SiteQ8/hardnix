<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 160" width="680" height="160">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#141820" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="680" height="160" fill="#090c10" rx="4"/>
  <rect width="680" height="160" fill="url(#grid)" opacity="0.7" rx="4"/>

  <!-- Left red border accent -->
  <rect x="0" y="0" width="3" height="160" fill="#ff4757" rx="1"/>

  <!-- ── Mini shield icon (left) ─────────────────────────────── -->
  <g transform="translate(26, 18)">
    <!-- Shield outline -->
    <path d="M60 6 L106 24 L106 72 Q106 108 60 126 Q14 108 14 72 L14 24 Z"
          fill="#0f1520" stroke="#2d3748" stroke-width="1.5"/>
    <!-- Shield top accent -->
    <path d="M60 6 L106 24 L14 24 Z"
          fill="none" stroke="#ff4757" stroke-width="1.5" opacity="0.8" filter="url(#subtleglow)"/>

    <!-- Inner hex -->
    <polygon points="60,34 80,45 80,67 60,78 40,67 40,45"
             fill="#0a0d14" stroke="#ff4757" stroke-width="1.2" filter="url(#subtleglow)"/>

    <!-- H letterform inside hex -->
    <rect x="46" y="46" width="6" height="26" fill="#ff4757" filter="url(#glow)"/>
    <rect x="68" y="46" width="6" height="26" fill="#ff4757" filter="url(#glow)"/>
    <rect x="46" y="57" width="28" height="6"  fill="#ff4757" filter="url(#glow)"/>

    <!-- Cursor blink indicator -->
    <rect x="74" y="63" width="5" height="7" fill="#ff4757" opacity="0.6" filter="url(#glow)"/>

    <!-- Corner brackets -->
    <g fill="none" stroke="#ff4757" stroke-width="1" opacity="0.5">
      <polyline points="20,38 20,26 32,26"/>
      <polyline points="100,38 100,26 88,26"/>
    </g>

    <!-- Bottom dots (5 of them for compact version) -->
    <g fill="#ff4757" opacity="0.45">
      <circle cx="40" cy="97" r="2"/>
      <circle cx="50" cy="105" r="2"/>
      <circle cx="60" cy="108" r="2"/>
      <circle cx="70" cy="105" r="2"/>
      <circle cx="80" cy="97" r="2"/>
    </g>
    <polyline points="40,97 50,105 60,108 70,105 80,97"
              fill="none" stroke="#ff4757" stroke-width="0.7" opacity="0.3"/>
  </g>

  <!-- Separator line -->
  <line x1="156" y1="28" x2="156" y2="132" stroke="#21262d" stroke-width="1"/>
  <line x1="157" y1="28" x2="157" y2="132" stroke="#ff4757" stroke-width="0.5" opacity="0.2"/>

  <!-- ── Wordmark: HARD ─────────────────────────────────────────── -->
  <!-- Using precise SVG paths for the letters for a custom industrial feel -->
  <g transform="translate(178, 0)">

    <!-- H -->
    <g fill="#e6edf3">
      <rect x="0"  y="46" width="9" height="68"/>
      <rect x="27" y="46" width="9" height="68"/>
      <rect x="0"  y="76" width="36" height="8"/>
    </g>

    <!-- A -->
    <g fill="#e6edf3" transform="translate(50,0)">
      <!-- left leg -->
      <polygon points="12,46 21,46 36,114 27,114"/>
      <!-- right leg -->
      <polygon points="24,46 33,46 18,114 9,114"/>
      <!-- crossbar -->
      <rect x="4" y="82" width="28" height="7"/>
    </g>

    <!-- R -->
    <g fill="#e6edf3" transform="translate(100,0)">
      <rect x="0" y="46" width="9" height="68"/>
      <!-- bump top -->
      <path d="M9 46 L32 46 Q44 46 44 60 Q44 74 32 74 L9 74 Z" />
      <rect x="9" y="58" width="14" height="8" fill="#0f1520"/>
      <!-- leg -->
      <polygon points="26,74 38,74 48,114 38,114"/>
    </g>

    <!-- D -->
    <g fill="#e6edf3" transform="translate(160,0)">
      <rect x="0" y="46" width="9" height="68"/>
      <path d="M9 46 L28 46 Q50 46 50 80 Q50 114 28 114 L9 114 Z"/>
      <path d="M9 55 L26 55 Q40 55 40 80 Q40 105 26 105 L9 105 Z" fill="#0f1520"/>
    </g>

  </g>

  <!-- Red separator dot between HARD and NIX -->
  <circle cx="389" cy="80" r="4" fill="#ff4757" filter="url(#glow)"/>
  <circle cx="389" cy="80" r="2" fill="#ff4757"/>

  <!-- ── Wordmark: NIX ──────────────────────────────────────────── -->
  <g transform="translate(404, 0)">

    <!-- N -->
    <g fill="#ff4757" filter="url(#subtleglow)">
      <rect x="0" y="46" width="9" height="68"/>
      <rect x="31" y="46" width="9" height="68"/>
      <polygon points="0,46 9,46 40,100 40,114 31,114 0,60"/>
    </g>

    <!-- I -->
    <g fill="#ff4757" transform="translate(57,0)" filter="url(#subtleglow)">
      <rect x="0"  y="46" width="26" height="8"/>
      <rect x="9"  y="54" width="8"  height="52"/>
      <rect x="0"  y="106" width="26" height="8"/>
    </g>

    <!-- X -->
    <g fill="#ff4757" transform="translate(98,0)" filter="url(#subtleglow)">
      <polygon points="0,46 14,46 36,80 14,114 0,114 22,80"/>
      <polygon points="22,46 36,46 50,80 36,114 22,114 0,80"/>
      <!-- cutout center -->
      <polygon points="15,46 21,46 36,80 30,80" fill="#090c10"/>
      <polygon points="15,114 21,114 36,80 30,80" fill="#090c10"/>
      <polygon points="29,46 35,46 20,80 14,80" fill="#090c10"/>
      <polygon points="29,114 35,114 20,80 14,80" fill="#090c10"/>
    </g>

  </g>

  <!-- ── Tagline ────────────────────────────────────────────────── -->
  <text x="178" y="136"
        font-family="'Courier New', monospace"
        font-size="10.5"
        fill="#6b7280"
        letter-spacing="3.5">
    SYSTEM HARDENING AUDITOR
  </text>

  <!-- ── Right side decorative details ────────────────────────── -->
  <g opacity="0.25" stroke="#ff4757" stroke-width="1" fill="none">
    <line x1="620" y1="20"  x2="660" y2="20"/>
    <line x1="620" y1="20"  x2="620" y2="40"/>
    <line x1="620" y1="140" x2="660" y2="140"/>
    <line x1="620" y1="140" x2="620" y2="120"/>
  </g>
  <text x="640" y="84" font-family="monospace" font-size="8"
        fill="#ff4757" opacity="0.35" text-anchor="middle" letter-spacing="1">v1.0.0</text>
  <text x="640" y="96" font-family="monospace" font-size="8"
        fill="#ff4757" opacity="0.25" text-anchor="middle" letter-spacing="1">107+</text>

</svg>
